<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Track</title>
    <link rel="shortcut icon" href="img/coin.png" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="src/input.css">
</head>

<body class="bg-[#0f172a] font-['Poppins'] min-h-screen flex items-center justify-center p-4">

    <section class="w-full max-w-[700px] bg-[#1e293b] border border-[#334155] rounded-3xl p-8 md:p-12 shadow-2xl">

        <header class="text-center mb-10">
            <h1 class="text-3xl font-semibold text-white tracking-tight">
                Coin <span class="text-sky-400">Track</span>
            </h1>
            <p class="text-slate-400 text-sm mt-2">Conversão de moedas em tempo real</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-[1fr_auto_1fr] gap-6 items-center">

            <div class="space-y-3">
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Origem</label>
                <div class="relative">
                    <input type="text" id="search1" placeholder="Ex: USD" autocomplete="off"
                        class="custom-input w-full bg-[#0f172a] border border-[#334155] text-white rounded-xl p-3 text-sm focus:outline-none focus:border-sky-400 transition-all">
                    <div class="dropdown absolute w-full z-10 hidden" id="dropdown1"></div>
                </div>
                <input type="number" id="valor1" value="1" min="0.01"
                    class="w-full bg-transparent border-b-2 border-[#334155] text-white text-2xl font-semibold py-2 focus:outline-none focus:border-sky-400 transition-all">
            </div>


            <div class="flex justify-center md:pt-6">

            </div>


            <div class="space-y-3">
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Destino</label>
                <div class="relative">
                    <input type="text" id="search2" placeholder="Ex: BRL" autocomplete="off"
                        class="custom-input w-full bg-[#0f172a] border border-[#334155] text-white rounded-xl p-3 text-sm focus:outline-none focus:border-sky-400 transition-all">
                    <div class="dropdown absolute w-full z-10 hidden" id="dropdown2"></div>
                </div>
                <input type="text" id="valor2" readonly placeholder="---"
                    class="w-full bg-transparent border-b-2 border-[#334155] text-sky-400 text-2xl font-semibold py-2 focus:outline-none">
            </div>
        </div>

        <footer class="mt-12 pt-6 border-t border-[#334155]/50 text-center">
            <p class="text-[11px] text-slate-500 uppercase tracking-widest">Taxas atualizadas via API</p>
        </footer>
    </section>

    <script src="script.js"></script>
</body>

</html>
